services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexacargo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/nexacargo
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata: